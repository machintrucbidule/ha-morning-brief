[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Ruff isort flags this file's import block (I001) but the layout matches
# every other module in the project that DOES pass. Suspect interaction
# between isort's section detection and the multi-line ``from .const
# import (...)`` block. Investigated for ~30 min, no fix found that
# isn't more confusing than the noqa. Revisit when ruff updates.
"custom_components/morning_brief/_form_schemas.py" = ["I001"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[tool.coverage.run]
source = ["custom_components/morning_brief"]
branch = false
omit = [
  "custom_components/morning_brief/brand/*",
  "*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]
# R11 + Section 30.1 — global floor; per-module targets (60-90%) tracked
# in the spec, verified by reading the per-module column in the report.
fail_under = 70
